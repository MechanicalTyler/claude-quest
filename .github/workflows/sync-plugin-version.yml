name: Sync Plugin Version

on:
  repository_dispatch:
    types: [plugin-version-bump]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin exists in marketplace.json
        run: |
          PLUGIN="${{ github.event.client_payload.plugin }}"
          MATCH=$(jq --arg name "$PLUGIN" '[.plugins[] | select(.name == $name)] | length' .claude-plugin/marketplace.json)
          if [ "$MATCH" -eq 0 ]; then
            echo "::error::Plugin '$PLUGIN' not found in .claude-plugin/marketplace.json"
            exit 1
          fi

      - name: Check if version already matches
        id: version-check
        run: |
          PLUGIN="${{ github.event.client_payload.plugin }}"
          VERSION="${{ github.event.client_payload.version }}"
          CURRENT=$(jq -r --arg name "$PLUGIN" '.plugins[] | select(.name == $name) | .version' .claude-plugin/marketplace.json)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "Version already matches ($VERSION), nothing to do."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Patch marketplace.json
        if: steps.version-check.outputs.skip == 'false'
        run: |
          PLUGIN="${{ github.event.client_payload.plugin }}"
          VERSION="${{ github.event.client_payload.version }}"
          jq --arg name "$PLUGIN" --arg ver "$VERSION" \
            '.plugins |= map(if .name == $name then .version = $ver else . end)' \
            .claude-plugin/marketplace.json > updated.json
          mv updated.json .claude-plugin/marketplace.json

      - name: Configure git
        if: steps.version-check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete stale branch if exists
        if: steps.version-check.outputs.skip == 'false'
        # Handles the case where a previous run for this plugin+version failed after
        # pushing the branch but before merging. Safe for race conditions: if two
        # dispatches arrive simultaneously, the second run will have already been
        # stopped by the version-check skip=true path once the first run merges.
        run: |
          PLUGIN="${{ github.event.client_payload.plugin }}"
          VERSION="${{ github.event.client_payload.version }}"
          git push origin --delete "chore/bump-$PLUGIN-$VERSION" 2>/dev/null || true

      - name: Commit and push
        if: steps.version-check.outputs.skip == 'false'
        run: |
          PLUGIN="${{ github.event.client_payload.plugin }}"
          VERSION="${{ github.event.client_payload.version }}"
          git checkout -b "chore/bump-$PLUGIN-$VERSION"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: bump $PLUGIN to $VERSION"
          git push origin "chore/bump-$PLUGIN-$VERSION"

      - name: Determine change type
        if: steps.version-check.outputs.skip == 'false'
        id: change-type
        run: |
          OLD="${{ steps.version-check.outputs.current }}"
          NEW="${{ github.event.client_payload.version }}"
          if printf '%s\n' "$OLD" "$NEW" | sort -V | head -1 | grep -q "^$NEW$"; then
            echo "type=downgrade" >> $GITHUB_OUTPUT
          else
            echo "type=upgrade" >> $GITHUB_OUTPUT
          fi

      - name: Open PR
        if: steps.version-check.outputs.skip == 'false'
        run: |
          PLUGIN="${{ github.event.client_payload.plugin }}"
          VERSION="${{ github.event.client_payload.version }}"
          OLD="${{ steps.version-check.outputs.current }}"
          gh pr create \
            --title "chore: bump $PLUGIN to $VERSION" \
            --body "Automated $CHANGE_TYPE: \`$PLUGIN\` $OLD → $VERSION" \
            --base main \
            --head "chore/bump-$PLUGIN-$VERSION"
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGE_TYPE: ${{ steps.change-type.outputs.type }}

      - name: Merge PR
        if: steps.version-check.outputs.skip == 'false'
        run: |
          PLUGIN="${{ github.event.client_payload.plugin }}"
          VERSION="${{ github.event.client_payload.version }}"
          gh pr merge "chore/bump-$PLUGIN-$VERSION" --squash --delete-branch
        env:
          GH_TOKEN: ${{ github.token }}
